[[block]]
block = "net"
device = "wlp3s0"
format = " $icon {$signal_strength|} $speed_down.eng(prefix:M)⇅$speed_up.eng(prefix:M)"
format_alt = " {ssid} {ip}"
interval = 5
inactive_format = ""
missing_format = ""

