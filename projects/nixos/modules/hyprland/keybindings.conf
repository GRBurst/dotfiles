###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mod = SUPER        # Sets "Windows" key as main modifier
$Alt = ALT          # Mod1
$AltGr = MOD3       # Mod3 (Note: Hyprland uses "ALTGR" for AltGr)
$Strg = CTRL        # Control

# Neo arrows with AltGr modifier
$MLeft = $AltGr LEFT
$MDown = $AltGr DOWN
$MRight = $AltGr RIGHT
$MUp = $AltGr UP

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, q, hy3:killactive
# bind = $mod SHIFT, e, exit
bind = $mod, f, fullscreen,

bind = $mod $AltGr, f, exec, $fileManager
bind = $mod SHIFT, space, togglefloating,
# bind = $mod SHIFT, T, togglegroup,
bind = $mod, o, exec, $menu
# bind = $mod, P, pseudo,
# bind = $mod, J, togglesplit,

# Basic window navigation (Neo layout) with hy3 dispatcher
bind = $mod, n, hy3:movefocus, l, nowrap
bind = $mod, g, hy3:movefocus, u, nowrap
bind = $mod, t, hy3:movefocus, r, nowrap
bind = $mod, r, hy3:movefocus, d, nowrap

# Move windows (Neo layout) with hy3 dispatcher
bind = $mod, i, hy3:movewindow, l
bind = $mod, l, hy3:movewindow, u
bind = $mod, e, hy3:movewindow, r
bind = $mod, a, hy3:movewindow, d

# Layout controls (similar to i3's split h/v and layouts)
bind = $mod, h, hy3:makegroup, h  # Set horizontal split
bind = $mod, v, hy3:makegroup, v  # Set vertical split
bind = $mod SHIFT, h, hy3:makegroup, toggle  # Toggle split layout
bind = $mod SHIFT, t, hy3:changegroup, toggletab     # Tabbed layout

# Parent/child focus (like i3's focus parent/child)
bind = $mod, p, hy3:changefocus, raise # Focus parent container
bind = $mod, c, hy3:changefocus, lower,  # Focus child container

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Switch to workspaces 11-19 (F-keys)
bind = $mod, F1, workspace, 11
bind = $mod, F2, workspace, 12
bind = $mod, F3, workspace, 13
bind = $mod, F4, workspace, 14
bind = $mod, F5, workspace, 15
bind = $mod, F6, workspace, 16
bind = $mod, F7, workspace, 17
bind = $mod, F8, workspace, 18
bind = $mod, F9, workspace, 19

# Move containers to workspaces 11-19
bind = $mod SHIFT, F1, movetoworkspace, 11
bind = $mod SHIFT, F2, movetoworkspace, 12
bind = $mod SHIFT, F3, movetoworkspace, 13
bind = $mod SHIFT, F4, movetoworkspace, 14
bind = $mod SHIFT, F5, movetoworkspace, 15
bind = $mod SHIFT, F6, movetoworkspace, 16
bind = $mod SHIFT, F7, movetoworkspace, 17
bind = $mod SHIFT, F8, movetoworkspace, 18
bind = $mod SHIFT, F9, movetoworkspace, 19

# Example special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Focus window, not working
bindn = , mouse:272, hy3:focustab, l, require_hovered

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow


# Program shortcuts
# bind = $mod $AltGr, colon, exec, librewolf
bind = $mod $AltGr, b, exec, librewolf
# bind = $mod $AltGr, Delete, exec, rofi-choose-container
# bind = $mod $AltGr, KP_Separator, exec, dropbox
# bind = $mod $AltGr, KP_9, exec, spacefm
# bind = $mod $AltGr, KP_8, exec, pidgin
bind = $mod $AltGr, k, exec, ~/local/bin/kxo
bind = $mod $AltGr SHIFT, k, exec, ~/local/bin/kd
bind = $mod $AltGr, m, exec, protonmail-bridge && thunderbird
# bind = $mod $AltGr, KP_4, exec, nmcli_dmenu
# bind = $mod $AltGr, KP_5, exec, RuneScape
bind = $mod $AltGr, p, exec, spotify-blockify
bind = $mod $AltGr, g, exec, steam
# bind = $mod $AltGr, BackSpace, exec, VirtualBox
# bind = $mod $AltGr, period, exec, skype
bind = $mod $AltGr, s, exec, signal-desktop
# bind = $mod $AltGr, Left, exec, idea-community
# bind = $mod $AltGr, Down, exec, thunderbird && librewolf && pidgin

# Volume and brightness controls
bind = , XF86AudioLowerVolume, exec, ponymix decrease 5
bind = , XF86AudioRaiseVolume, exec, ponymix increase 5
bind = , XF86AudioMute, exec, ponymix toggle
bind = $mod, M, exec, ponymix --source toggle
bind = , XF86MonBrightnessUp, exec, light -A 5
bind = , XF86MonBrightnessDown, exec, light -U 5

# Window rules (equivalent to i3's assign)
windowrule = move workspace 1, title:(?i)thunderbird
windowrule = move workspace 1, class:(?i)ProtonMail Bridge
windowrule = move workspace 2, class:(?i)navigator
windowrule = move workspace 2, class:(?i)browser
windowrule = move workspace 7, class:(?i)keepassxc
windowrule = move workspace 9, class:(?i)signal
windowrule = move workspace 9, class:(?i)ekiga
windowrule = move workspace 9, class:(?i)pidgin

# Modes (Hyprland supports submaps)
submap = Exit
# bind = $mod, r, exec, unmount-container-sync && systemctl reboot
# bind = $mod, s, exec, unmount-container-sync && systemctl suspend
# bind = $mod, p, exec, unmount-container-sync && systemctl poweroff
# bind = $mod, e")), exec, unmount-container-sync && hyprctl dispatch exit
bind = , r, exec, systemctl reboot
bind = , s, exec, systemctl suspend
bind = , p, exec, systemctl poweroff
bind = , e, exit
bind = $AltGr, Delete, exec, hyprctl reload, submap, reset
bind = $AltGr, KP_5, exec, hyprctl restart
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset
bind = $mod SHIFT, E, submap, Exit

submap = Screen
bind = , S, exec, i3lock && xset dpms force standby, submap, reset
bind = , P, exec, i3lock && xset dpms force suspend, submap, reset
bind = , L, exec, xinput disable "$(xinput list | grep -i ".*mouse.*slave.*pointer.*" | cut -f2 | sed "s/id=//" | head -n 1)" && xset dpms force off && i3lock --nofork && xinput enable "$(xinput list | grep -i ".*mouse.*floating.*slave.*" | cut -f2 | sed "s/id=//" | head -n 1)", submap, reset
bind = , O, exec, xset dpms force off, submap, reset
bind = , K, exec, xset -dpms && xset s off && systemctl --user stop redshift && xrandr --output DP-0 --primary --auto --output HDMI-1 --off, submap, reset
bind = , G, exec, xrandr --output DP-0 --primary --mode 1920x1080 --output HDMI-1 --auto --right-of DP-0, submap, reset
bind = , H, exec, xrandr --output DP-0 --auto --primary --output HDMI-1 --mode 1920x1080 --right-of DP-0, submap, reset
bind = , KP_1, exec, xrandr --output DP-0 --primary --auto --output HDMI-1 --off, submap, reset
bind = , A, exec, xrandr --output DP-0 --primary --mode 1920x1080 --output HDMI-1 --off, submap, reset
bind = , R, exec, xrandr --output DP-0 --primary --auto --output HDMI-1 --auto --right-of DP-0, submap, reset
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset
bind = $mod SHIFT, M, submap, Screen

submap = Resize
bind = , I, resizeactive, -10 0
bind = , E, resizeactive, 10 0
bind = , L, resizeactive, 0 10
bind = , A, resizeactive, 0 -10
bind = , Left, resizeactive, -1 0
bind = , Right, resizeactive, 1 0
bind = , Up, resizeactive, 0 -1
bind = , Down, resizeactive, 0 1
bind = , KP_2, resizeactive, 1920 1080, movewindow, center, submap, reset
bind = , KP_4, resizeactive, 3840 2160, movewindow, center, submap, reset
bind = , KP_7, resizeactive, 1280 720, movewindow, center, submap, reset
bind = , C, movewindow, center, submap, reset
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset
bind = $mod SHIFT, R, submap, Resize

submap = Work
bind = , W, exec, hyprctl dispatch workspace 1 && protonmail-bridge && thunderbird && hyprctl dispatch workspace 2 && librewolf && hyprctl dispatch workspace 7 && ~/local/bin/kxo && hyprctl dispatch workspace 9 && signal-desktop && librewolf --new-window --kiosk https://priceloop.slack.com && hyprctl dispatch workspace 3 && alacritty --working-directory ~/projects/priceloop/ogopogo/nocode, submap, reset
bind = , S, movetoworkspace, special
bind = , S SHIFT, togglespecialworkspace
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset
bind = $mod SHIFT, W, submap, Work

submap = Refocus
bind = $MLeft, , movefocus, l
bind = $MDown, , movefocus, d
bind = $MUp, , movefocus, u
bind = $MRight, , movefocus, r
bind = , P, hy3:changefocus, raise
bind = , C, hy3:changefocus, lower
bind = SHIFT $MLeft, , movewindow, l
bind = SHIFT $MDown, , movewindow, d
bind = SHIFT $MUp, , movewindow, u
bind = SHIFT $MRight, , movewindow, r
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = , Q, submap, reset
submap = reset
bind = $mod SHIFT, F, submap, Refocus

submap = Redesign
bind = $mod, N, exec, hyprctl keyword windowrule "border 0"
bind = $mod, Y, exec, hyprctl keyword windowrule "border 1"
bind = $mod, B, exec, hyprctl keyword windowrule "border 2"
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = , Q, submap, reset
submap = reset
bind = $mod SHIFT, D, submap, Redesign










